<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
    <defs>
        <!-- Outer dark forest fill -->
        <radialGradient id="outerGrad" cx="50%" cy="50%" r="55%">
            <stop offset="0%" stop-color="#2d5a1b" />
            <stop offset="100%" stop-color="#1a3a0d" />
        </radialGradient>

        <!-- Inner bright grass fill -->
        <linearGradient id="innerGrass" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6bbf3a" />
            <stop offset="50%" stop-color="#7dd444" />
            <stop offset="100%" stop-color="#5da832" />
        </linearGradient>

        <!-- Checkerboard grass pattern (subtle, like CoC) -->
        <pattern id="grassCheck" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="#7dd444" />
            <rect width="20" height="20" fill="#74cf3c" opacity="0.55" />
            <rect x="20" y="20" width="20" height="20" fill="#74cf3c" opacity="0.55" />
        </pattern>

        <!-- Border grass strip (transition between forest and inner field) -->
        <linearGradient id="borderGrass" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4e9626" />
            <stop offset="100%" stop-color="#3d7a1c" />
        </linearGradient>

        <!-- Drop shadow for inner field -->
        <filter id="fieldShadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="rgba(0,0,0,0.35)" />
        </filter>

        <!-- Tree shapes reuse -->
        <g id="tree">
            <ellipse cx="0" cy="-14" rx="11" ry="10" fill="#2a6614" />
            <ellipse cx="0" cy="-20" rx="9" ry="9" fill="#35841c" />
            <ellipse cx="0" cy="-26" rx="7" ry="7" fill="#3e9920" />
            <rect x="-2" y="-4" width="4" height="10" fill="#6b4226" />
        </g>

        <g id="tree-sm">
            <ellipse cx="0" cy="-10" rx="8" ry="7" fill="#266012" />
            <ellipse cx="0" cy="-15" rx="6" ry="6" fill="#2e7519" />
            <ellipse cx="0" cy="-20" rx="5" ry="5" fill="#358a1c" />
            <rect x="-1.5" y="-3" width="3" height="8" fill="#5a3820" />
        </g>

        <g id="rock">
            <ellipse cx="0" cy="0" rx="8" ry="6" fill="#8a8a8a" />
            <ellipse cx="-2" cy="-1" rx="5" ry="4" fill="#a8a8a8" />
            <ellipse cx="3" cy="1" rx="4" ry="3" fill="#7a7a7a" />
        </g>

        <g id="bush">
            <ellipse cx="0" cy="0" rx="9" ry="7" fill="#2d7a18" />
            <ellipse cx="-4" cy="-2" rx="6" ry="5" fill="#38961f" />
            <ellipse cx="4" cy="-1" rx="6" ry="5" fill="#32881a" />
        </g>
    </defs>

    <!-- ── Outer forest background ── -->
    <rect width="800" height="800" fill="url(#outerGrad)" />

