    <!-- Subtle inner shadow / vignette on field edges -->
    <rect x="165" y="165" width="470" height="470" rx="4" ry="4" fill="none" stroke="#3d8818" stroke-width="3" />

    <!-- Faint grid lines on the inner field (9 columns, 9 rows) -->
    <!-- Vertical lines at ~52px intervals (470/9 ≈ 52) -->
    <g stroke="#6aaa33" stroke-width="0.6" opacity="0.5">
        <line x1="217" y1="165" x2="217" y2="635" />
        <line x1="269" y1="165" x2="269" y2="635" />
        <line x1="321" y1="165" x2="321" y2="635" />
        <line x1="373" y1="165" x2="373" y2="635" />
        <line x1="425" y1="165" x2="425" y2="635" />
        <line x1="477" y1="165" x2="477" y2="635" />
        <line x1="529" y1="165" x2="529" y2="635" />
        <line x1="581" y1="165" x2="581" y2="635" />
        <!-- Horizontal -->
