    <!-- ── Border transition strip (inner ring before grass field) ── -->
    <rect x="145" y="145" width="510" height="510" rx="6" ry="6" fill="#4a8e22" filter="url(#fieldShadow)" />

    <!-- ── Inner grass field (the "base" area where buildings go) ── -->
