{% extends "base.html" %}
{% block title %}Register — BattleCells{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-bold mb-6 text-center">Create Account</h1>
  <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1">Username</label>
      <input name="username" type="text" required autocomplete="username"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500" />
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Password</label>
      <input name="password" type="password" required autocomplete="new-password"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500" />
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
      <input name="confirm" type="password" required autocomplete="new-password"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500" />
    </div>
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 rounded transition-colors">
      Register
    </button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-4">
    Already have an account? <a href="{{ url_for('auth.login') }}" class="text-blue-400 hover:underline">Login</a>
  </p>
</div>
{% endblock %}
