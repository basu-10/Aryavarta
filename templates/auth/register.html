{% extends "base.html" %}
{% block title %}Register — BattleCells{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bc-card p-8">
    <div class="text-center mb-7">
      <div class="font-display text-4xl tracking-widest mb-1" style="color:#22c55e">BATTLECELLS</div>
      <p class="text-slate-400 text-sm">Create your account, Commander</p>
    </div>
    <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest text-slate-400 mb-1.5">Username</label>
        <input name="username" type="text" required autocomplete="username"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-green-500 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest text-slate-400 mb-1.5">Password</label>
        <input name="password" type="password" required autocomplete="new-password"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-green-500 transition-colors" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest text-slate-400 mb-1.5">Confirm Password</label>
        <input name="confirm" type="password" required autocomplete="new-password"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-green-500 transition-colors" />
      </div>
      <button type="submit" class="bc-btn bc-btn-green w-full mt-2">
        Start Your Legacy
      </button>
    </form>
    <p class="text-center text-sm text-slate-500 mt-5">
      Already have an account? <a href="{{ url_for('auth.login') }}" class="text-green-400 hover:text-green-300 font-medium">Login</a>
    </p>
  </div>
</div>
{% endblock %}
