{% extends "base.html" %}
{% block title %}World Map — BattleCells{% endblock %}
{% block content %}

<div class="relative left-1/2 right-1/2 -mx-[50vw] w-screen px-4">
  <div class="w-full min-w-0">
    <div class="flex flex-wrap items-center gap-3 mb-2">
      <h1 class="text-xl font-bold">World Map
        <span class="text-sm font-normal text-gray-400">(click any entity to interact)</span>
      </h1>
      <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer select-none ml-auto">
        <input type="checkbox" id="toggle-labels" class="w-4 h-4 accent-blue-500" />
        <span>Show names &amp; stars</span>
      </label>
    </div>

    <div id="world-map-shell" class="relative overflow-hidden border border-gray-700 rounded bg-gray-950">
      <div class="overflow-auto" style="max-height:74vh">
        <div id="world-grid"
             style="display:inline-grid;grid-template-columns:repeat({{ world_w }},26px);gap:1px;padding:4px;background:#030712;min-width:max-content">
          <!-- filled by buildGrid() -->
        </div>
      </div>

      <div id="entity-popup" class="hidden absolute z-20" style="min-width:280px;max-width:min(22rem, calc(100vw - 2rem));"></div>

      <div id="legend-card" class="absolute right-3 bottom-3 z-10 w-56 bg-gray-900/70 backdrop-blur border border-gray-600 rounded-lg shadow-lg">
        <button id="legend-toggle" class="w-full flex items-center justify-between px-3 py-2 text-xs font-semibold tracking-wide text-gray-200 hover:bg-gray-800/40 rounded-t-lg">
          <span>Legend</span>
          <span id="legend-caret">▾</span>
        </button>
        <div id="legend-body" class="px-3 pb-3 text-xs text-gray-300 space-y-1">
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm bg-blue-500"></span>Your Castle</div>
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm" style="background:#1d4ed8"></span>Other Castle</div>
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm" style="background:#7c3aed"></span>NPC Castle</div>
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm bg-green-500"></span>Your Fort</div>
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm bg-red-500"></span>Enemy Fort</div>
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm bg-orange-500"></span>Monster Fort</div>
          <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-sm bg-purple-500"></span>Monster Camp</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const WORLD_W   = {{ world_w }};
const WORLD_H   = {{ world_h }};
const PLAYER_ID = {{ session.get('player_id') | tojson }};

const BG = {
  empty:        '#030712',
  castle_own:   '#2563eb',
  castle_npc:   '#7c3aed',
  castle_other: '#1e3a8a',
  fort_own:     '#16a34a',
  fort_npc:     '#b45309',   // amber — NPC-owned fort
  fort_enemy:   '#dc2626',
  fort_monster: '#ea580c',
  camp:         '#9333ea',
};

const ICON = { castle: '\u{1F3F0}', fort: '\u{1F3EF}', monster_camp: '\u{1F47E}' };

let entityMap = {};
let showLabels = false;
let legendOpen = true;
let popupAnchor = { x: 12, y: 12 };

document.getElementById('toggle-labels').addEventListener('change', e => {
  showLabels = e.target.checked;
  rebuildGrid();
});

document.getElementById('legend-toggle').addEventListener('click', () => {
  legendOpen = !legendOpen;
  const body = document.getElementById('legend-body');
  const caret = document.getElementById('legend-caret');
  body.classList.toggle('hidden', !legendOpen);
  caret.textContent = legendOpen ? '▾' : '▸';
});

function stars(n) { return n ? '\u2605'.repeat(Math.min(n, 4)) : ''; }

function buildGrid(items) {
  entityMap = {};
  for (const item of items) entityMap[`${item.grid_x},${item.grid_y}`] = item;
  rebuildGrid();
}

function rebuildGrid() {
  const grid = document.getElementById('world-grid');
  const parts = [];

  for (let y = 0; y < WORLD_H; y++) {
    for (let x = 0; x < WORLD_W; x++) {
      const item = entityMap[`${x},${y}`];
      if (!item) {
        parts.push(`<div style="width:26px;height:26px;background:${BG.empty}"></div>`);
        continue;
      }

      let bg, label, starStr = '';

      if (item.type === 'castle') {
        if (item.owner_id === PLAYER_ID) {
          bg = BG.castle_own; label = 'Your Castle';
        } else if (item.is_npc) {
          bg = BG.castle_npc; label = item.owner_name || 'NPC';
        } else {
          bg = BG.castle_other; label = item.owner_name || '?';
        }
      } else if (item.type === 'fort') {
        if (item.owner_id === PLAYER_ID) {
          bg = BG.fort_own; label = 'Your Fort';
        } else if (item.is_npc) {
          bg = BG.fort_npc; label = item.owner_name || 'NPC Fort';
          starStr = item.star_level ? stars(item.star_level) : '';
        } else if (item.owner_id) {
          bg = BG.fort_enemy; label = item.owner_name || 'Enemy Fort';
        } else {
          bg = BG.fort_monster; label = 'Monster Fort';
          starStr = item.star_level ? stars(item.star_level) : '';
        }
      } else {
        bg = BG.camp; label = 'Monster Camp';
        starStr = item.star_level ? stars(item.star_level) : '';
      }

      const icon = ICON[item.type] || '';
      const tooltipFull = label + (starStr ? ' ' + starStr : '');

      // Label overlay text (shown when toggle is on)
      const labelHtml = showLabels
        ? `<div style="position:absolute;bottom:100%;left:50%;transform:translateX(-50%);` +
          `white-space:nowrap;font-size:9px;background:rgba(0,0,0,.85);color:#e5e7eb;` +
          `padding:1px 4px;border-radius:3px;pointer-events:none;z-index:10;">` +
          `${label}${starStr ? ' ' + starStr : ''}</div>`
        : '';

      parts.push(
        `<div data-type="${item.type}" data-id="${item.id}"` +
        ` style="width:26px;height:26px;background:${bg};font-size:14px;line-height:26px;` +
        `text-align:center;cursor:pointer;border-radius:2px;position:relative;"` +
        ` title="${tooltipFull}">${icon}${labelHtml}</div>`
      );
    }
  }
  grid.innerHTML = parts.join('');

  // Single delegated click listener
  grid.onclick = e => {
    const cell = e.target.closest('[data-type]');
    if (!cell) return;
    openEntityPopup(cell);
  };
}

function clampPopup() {
  const shell = document.getElementById('world-map-shell');
  const popup = document.getElementById('entity-popup');
  if (popup.classList.contains('hidden')) return;

  const maxX = Math.max(8, shell.clientWidth - popup.offsetWidth - 8);
  const maxY = Math.max(8, shell.clientHeight - popup.offsetHeight - 8);
  const x = Math.min(maxX, Math.max(8, popupAnchor.x));
  const y = Math.min(maxY, Math.max(8, popupAnchor.y));

  popup.style.left = `${x}px`;
  popup.style.top = `${y}px`;
}

function openEntityPopup(cell) {
  const shell = document.getElementById('world-map-shell');
  const popup = document.getElementById('entity-popup');
  const cellRect = cell.getBoundingClientRect();
  const shellRect = shell.getBoundingClientRect();

  popupAnchor = {
    x: cellRect.right - shellRect.left + 10,
    y: cellRect.top - shellRect.top - 4,
  };

  popup.classList.remove('hidden');
  popup.style.left = `${popupAnchor.x}px`;
  popup.style.top = `${popupAnchor.y}px`;

  htmx.ajax('GET', `/world/item/${cell.dataset.type}/${cell.dataset.id}`,
            {target: '#entity-popup', swap: 'innerHTML'});
}

function closeEntityPopup() {
  document.getElementById('entity-popup').classList.add('hidden');
}

document.body.addEventListener('htmx:afterSwap', (event) => {
  if (event.target.id !== 'entity-popup') return;
  clampPopup();
});

document.addEventListener('click', (event) => {
  const popup = document.getElementById('entity-popup');
  if (popup.classList.contains('hidden')) return;
  if (event.target.closest('#entity-popup')) return;
  if (event.target.closest('[data-type]')) return;
  closeEntityPopup();
});

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeEntityPopup();
});

window.addEventListener('resize', clampPopup);

async function loadMap() {
  const res = await fetch('/api/world/map');
  const data = await res.json();
  buildGrid(data.items || []);
}

loadMap();
setInterval(loadMap, 10000);
</script>

{% endblock %}
