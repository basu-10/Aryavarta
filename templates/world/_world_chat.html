{% for msg in messages %}
<div class="flex items-start gap-2 group" data-sender-id="{{ msg.sender_id }}"
     data-sender-name="{{ msg.username }}" data-castle-id="{{ msg.castle_id or '' }}"
     data-grid-x="{{ msg.grid_x or '' }}" data-grid-y="{{ msg.grid_y or '' }}">
  <div class="flex-1 min-w-0">
    <button type="button"
            class="font-semibold text-blue-400 hover:text-blue-300 text-xs leading-none chat-name-btn"
            data-sender-id="{{ msg.sender_id }}"
            data-sender-name="{{ msg.username }}"
            data-castle-id="{{ msg.castle_id or '' }}"
            data-grid-x="{{ msg.grid_x or '' }}"
            data-grid-y="{{ msg.grid_y or '' }}">{{ msg.username }}</button>
    <span class="text-gray-300 text-xs ml-1 break-words">{{ msg.message }}</span>
  </div>
    <span class="text-gray-600 text-[10px] mt-0.5 shrink-0"
      data-chat-timestamp="{{ msg.sent_at }}"
      data-chat-timestamp-mode="time">{{ msg.sent_at[11:16] }}</span>
  {% if player and player.role in ('mod', 'admin') %}
  <button type="button"
          onclick="softDeleteChatMsg({{ msg.id }}, this)"
          title="Delete message"
          class="text-red-700 hover:text-red-400 text-[10px] mt-0.5 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
    ✕
  </button>
  {% endif %}
</div>
{% else %}
<p class="text-gray-600 text-xs italic text-center">No messages yet. Say hello!</p>
{% endfor %}

<script>
async function softDeleteChatMsg(msgId, btn) {
  if (!confirm('Delete this message?')) return;
  const r = await fetch(`/api/world/chat/${msgId}/delete`, { method: 'POST' });
  const j = await r.json();
  if (j.ok) {
    btn.closest('div.group').remove();
  } else {
    alert(j.error || 'Could not delete message.');
  }
}
</script>
