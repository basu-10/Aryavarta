{% extends "base.html" %}
{% block title %}Select World — BattleCells{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] px-4">
  <h1 class="text-3xl font-bold mb-2">Choose a World</h1>
  <p class="text-gray-400 text-sm mb-8">Select the world you want to enter.</p>

  <form method="POST" action="{{ url_for('world.select_world_post') }}" class="w-full max-w-xl">
    <div class="grid gap-4">
      {% for w in worlds %}
      <button type="submit" name="world_id" value="{{ w.id }}"
              class="bg-gray-800 hover:bg-gray-700 border border-gray-700 hover:border-blue-500
                     rounded-lg p-5 text-left transition-colors group">
        <div class="flex items-center justify-between mb-1">
          <span class="text-lg font-semibold text-blue-300 group-hover:text-blue-200">{{ w.name }}</span>
          {% if w.is_default %}
          <span class="text-xs bg-yellow-800 text-yellow-300 rounded px-2 py-0.5">default</span>
          {% endif %}
        </div>
        <div class="text-xs text-gray-400">
          Grid {{ w.grid_width }} × {{ w.grid_height }} &nbsp;·&nbsp;
          {{ w.num_forts }} forts &nbsp;·&nbsp; {{ w.num_camps }} camps
        </div>
      </button>
      {% else %}
      <div class="text-center text-gray-500 py-12">
        No worlds are available yet. Please contact an administrator.
      </div>
      {% endfor %}
    </div>
  </form>
</div>
{% endblock %}
